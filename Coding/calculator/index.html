<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind Calculator</title>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">

    <main class="container max-w-xs bg-gray-200 p-4 rounded-2xl shadow-xl">
   
        <section class="w-full mb-4">
            <input id="display" type="text" readonly placeholder="0" 
                   class="w-full text-right text-4xl p-6 bg-slate-800 text-white rounded-xl outline-none" 
                   disabled>
        </section>


        <section class="grid grid-cols-4 gap-3">

            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">1</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">2</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">3</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">4</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">5</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">6</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">7</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">8</button>
            <button data-number class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">9</button>
            <button data-decimal class="bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">.</button>
            <button data-number class="col-span-2 bg-white hover:bg-gray-50 text-slate-900 p-4 rounded-lg shadow font-bold text-xl">0</button>
           
            <button data-operator class="bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-lg font-bold text-xl">+</button>
            <button data-operator class="bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-lg font-bold text-xl">-</button>
            <button data-operator class="bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-lg font-bold text-xl">/</button>
            <button data-operator class="bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-lg font-bold text-xl">*</button>

          
            <button data-clear class="col-span-2 bg-red-500 hover:bg-red-600 text-white p-4 rounded-lg font-bold">CLEAR</button>
            <button data-equals class="col-span-2 bg-slate-700 hover:bg-slate-800 text-white p-4 rounded-lg shadow-sm font-bold text-xl">=</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
